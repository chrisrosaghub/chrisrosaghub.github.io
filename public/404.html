<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Brain Buddy</title>
    <script>
        // SPA redirect for GitHub Pages
        // Encodes the full path into a query param so index.html can restore it.
        // segmentCount = 1 for project pages (e.g. /brainbuddy/)
        var segmentCount = 1;
        var l = window.location;
        l.replace(
            l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
                .split("/")
                .slice(0, 1 + segmentCount)
                .join("/") +
            "/?/" +
            l.pathname
                .slice(1)
                .split("/")
                .slice(segmentCount)
                .join("/")
                .replace(/&/g, "~and~") +
            (l.search
                ? "&" + l.search.slice(1).replace(/&/g, "~and~")
                : "") +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
